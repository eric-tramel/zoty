name: Release

on:
  push:
    tags: ["v*"]

jobs:
  build-artifacts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install build .
      - run: make build
      - run: make test
      - run: python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: zotero-plugin-xpi
          path: zotero-plugin/dist/zoty-bridge.xpi

  github-release:
    needs: build-artifacts
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist
      - uses: actions/download-artifact@v4
        with:
          name: zotero-plugin-xpi
          path: zotero-plugin/dist
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*
            zotero-plugin/dist/zoty-bridge.xpi

  publish-pypi:
    needs: build-artifacts
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
