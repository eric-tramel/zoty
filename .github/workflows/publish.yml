name: Release

on:
  push:
    tags: ["v*"]

jobs:
  build-artifacts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install build .
      - run: make release-build RELEASE_TAG="${GITHUB_REF_NAME}"
      - run: git diff --exit-code -- zotero-plugin/dist/zoty-bridge.xpi zotero-plugin/dist/zoty-bridge-updates.json src/zoty/assets/zoty-bridge.xpi
      - run: python -m compileall src scripts tests
      - run: make test
      - run: python -m build
      - run: python scripts/verify_wheel_xpi.py dist/*.whl
      - uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: zotero-plugin
          path: |
            zotero-plugin/dist/zoty-bridge.xpi
            zotero-plugin/dist/zoty-bridge-updates.json

  github-release:
    needs: build-artifacts
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist
      - uses: actions/download-artifact@v4
        with:
          name: zotero-plugin
          path: zotero-plugin/dist
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*
            zotero-plugin/dist/zoty-bridge.xpi
            zotero-plugin/dist/zoty-bridge-updates.json

  publish-pypi:
    needs: build-artifacts
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
